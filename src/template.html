<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Engineer | Portfolio</title>
    <meta name="description" content="{{PROFILE_ABOUT}}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #FFFBEB;
            --bg-dark: #1a1a2e;
            --card-bg: #FFFFFF;
            --card-bg-dark: #16213e;
            --accent: #E8531D;
            --accent-alt: #4CC9F0;
            --accent-yellow: #FFD166;
            --border: #000000;
            --border-dark: #e2e8f0;
            --shadow: #000000;
            --shadow-dark: #0f0f23;
            --text: #000000;
            --text-dark: #FFFBEB;

            /* Platform Colors */
            --shopify: #2EC866;
            --webflow: #4353FF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .dark {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 300px;
        }

        /* Custom Scrollbar for horizontal strips */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Neo-Brutal Cards */
        .neo-card {
            border: 3px solid var(--border);
            box-shadow: 5px 5px 0 var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .dark .neo-card {
            border-color: var(--border-dark);
            box-shadow: 5px 5px 0 var(--shadow-dark);
        }
        .neo-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 var(--shadow);
        }
        .dark .neo-card:hover {
            box-shadow: 7px 7px 0 var(--shadow-dark);
        }

        /* Neo-Brutal Buttons */
        .neo-btn {
            border: 3px solid var(--border);
            box-shadow: 4px 4px 0 var(--shadow);
            font-weight: 800;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .dark .neo-btn {
            border-color: var(--border-dark);
            box-shadow: 4px 4px 0 var(--shadow-dark);
        }
        .neo-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--shadow);
        }
        .dark .neo-btn:hover {
            box-shadow: 6px 6px 0 var(--shadow-dark);
        }
        .neo-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 var(--shadow);
        }
        .dark .neo-btn:active {
            box-shadow: 0 0 0 var(--shadow-dark);
        }

        /* Theme-aware borders (inline var(--border) stays black in dark mode) */
        .theme-border-b {
            border-bottom: 3px solid var(--border);
        }
        .dark .theme-border-b {
            border-bottom-color: var(--border-dark);
        }
        .theme-border-t {
            border-top: 3px solid var(--border);
        }
        .dark .theme-border-t {
            border-top-color: var(--border-dark);
        }
        .theme-border-l {
            border-left: 3px solid var(--border);
        }
        .dark .theme-border-l {
            border-left-color: var(--border-dark);
        }

        .themed-category-dot {
            border: 2px solid var(--border);
        }
        .dark .themed-category-dot {
            border-color: var(--border-dark);
        }

        .project-band {
            border-top: 3px solid var(--band-color);
            border-bottom: 3px solid var(--band-color);
            background-color: color-mix(in srgb, var(--band-color) 8%, var(--bg));
        }
        .dark .project-band {
            background-color: color-mix(in srgb, var(--band-color) 20%, var(--bg-dark));
        }

        .img-placeholder {
            background-color: #f9fafb;
            color: #4b5563;
        }
        .dark .img-placeholder {
            background-color: rgba(0, 0, 0, 0.35);
            color: rgba(255, 251, 235, 0.65);
        }

        .text-muted {
            color: rgba(0, 0, 0, 0.65);
        }
        .dark .text-muted {
            color: rgba(255, 251, 235, 0.75);
        }
        .neo-border {
            border: 3px solid var(--border);
        }
        .dark .neo-border {
            border-color: var(--border-dark);
        }

        .neo-shadow {
            box-shadow: 5px 5px 0 var(--shadow);
        }
        .dark .neo-shadow {
            box-shadow: 5px 5px 0 var(--shadow-dark);
        }

        /* Timeline Nodes */
        .timeline-node {
            width: 16px;
            height: 16px;
            background-color: var(--accent);
            border: 3px solid var(--border);
            position: absolute;
            left: -9px;
            top: 6px;
        }
        .dark .timeline-node {
            border-color: var(--border-dark);
        }
    </style>
</head>

<body class="antialiased dark">

    <nav class="fixed top-0 w-full z-50 bg-[var(--bg)] dark:bg-[var(--bg-dark)] theme-border-b">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="font-black text-xl tracking-widest italic">USER<span class="text-[var(--accent)]">.</span>PROFILE</div>
            <button id="themeToggle"
                class="neo-btn px-4 py-2 bg-[var(--accent-yellow)] text-black font-mono text-xs">
                <span id="themeLabel">☀ LIGHT MODE</span>
            </button>
        </div>
    </nav>

    <main class="pt-32 pb-10">

        <section class="px-6 max-w-6xl mx-auto mb-32 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            <div class="lg:col-span-7">
                <div id="stats-summary" class="neo-btn inline-block px-4 py-2 bg-[var(--accent-yellow)] text-black text-xs font-bold mb-6 font-mono">{{STATS_SUMMARY}}</div>
                <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter"><span id="profile-greeting">{{PROFILE_GREETING}}</span></h1>
                <h2 id="profile-title" class="text-2xl font-extrabold mb-6">{{PROFILE_TITLE}}</h2>
                <p id="profile-about" class="text-lg leading-relaxed mb-8 max-w-2xl">
                    {{PROFILE_ABOUT}}
                </p>

                <div id="social-links" class="flex flex-wrap gap-4 font-mono text-sm">
                    {{SOCIAL_LINKS}}
                </div>
            </div>
            <div class="lg:col-span-5 flex justify-center lg:justify-end">
                <div class="relative">
                    <div class="absolute -bottom-3 -right-3 w-64 h-64 md:w-80 md:h-80 bg-[var(--accent)] neo-border"></div>
                    <img id="profile-avatar" src="{{PROFILE_AVATAR}}"
                        alt="Profile Picture"
                        class="relative z-10 w-64 h-64 md:w-80 md:h-80 object-cover neo-border">
                </div>
            </div>
        </section>

        <section class="px-6 max-w-6xl mx-auto mb-32 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <div class="neo-card bg-[var(--card-bg)] dark:bg-[var(--card-bg-dark)] text-[var(--text)] dark:text-[var(--text-dark)] p-8 relative">
                <div class="absolute -top-4 left-6 neo-btn px-3 py-1 bg-[var(--accent-alt)] text-black text-[11px] font-mono font-bold">
                    SKILLS RADAR</div>
                <div class="chart-container mt-4">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <div>
                <h2 class="text-3xl font-black mb-4 tracking-tighter">TECH_STACK</h2>
                <p id="tech-description" class="mb-6 leading-relaxed">
                    {{TECH_DESCRIPTION}}
                </p>
                <div id="tech-tools" class="grid grid-cols-2 gap-4 font-mono text-sm">
                    {{TECH_TOOLS}}
                </div>
            </div>
        </section>

        <section class="px-6 max-w-6xl mx-auto mb-32">
            <h2 class="text-4xl font-black mb-12 tracking-tighter">EXPERIENCE <span
                    class="text-sm font-mono font-normal text-[var(--accent)]">/ CV</span></h2>

            <div id="cv-timeline" class="ml-3 space-y-12 pb-4 theme-border-l">
                {{CV_ITEMS}}
            </div>
        </section>

        <div class="mb-12 px-6 max-w-6xl mx-auto">
            <h2 class="text-4xl font-black tracking-tighter">PROJECTS <span
                    class="text-sm font-mono font-normal text-[var(--accent)]">/ WORK</span></h2>
        </div>

        <div id="projects-container">
            {{PROJECT_SECTIONS}}
        </div>

    </main>

    <footer class="bg-[var(--accent)] py-12 mt-20 text-black text-center theme-border-t">
        <div class="flex justify-center gap-4 mb-6">
            {{FOOTER_LINKS}}
        </div>
        <p class="text-sm font-bold font-mono tracking-tighter">
            &copy; {{COPYRIGHT_YEAR}} — {{FOOTER_TEXT}}
        </p>
    </footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeLabel = document.getElementById('themeLabel');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            themeLabel.innerText = isDark ? '☀ LIGHT MODE' : '☾ DARK MODE';
            updateRadar(isDark);
        });

        // --- Radar Chart Logic ---
        let radar;
        let radarLabels = {{RADAR_LABELS}};
        let radarData = {{RADAR_DATA}};

        function initRadar(isDark) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const gridColor = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
            const labelColor = isDark ? '#FFFBEB' : '#000000';

            radar = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: radarLabels,
                    datasets: [{
                        data: radarData,
                        backgroundColor: 'rgba(232, 83, 29, 0.25)',
                        borderColor: '#E8531D',
                        pointBackgroundColor: '#E8531D',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            grid: { color: gridColor, lineWidth: 1.5 },
                            angleLines: { color: gridColor, lineWidth: 1.5 },
                            pointLabels: { color: labelColor, font: { size: 11, family: 'monospace', weight: 'bold' } },
                            ticks: { display: false }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateRadar(isDark) {
            if (!radar) return;
            const color = isDark ? '#FFFBEB' : '#000000';
            const grid = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
            radar.options.scales.r.pointLabels.color = color;
            radar.options.scales.r.grid.color = grid;
            radar.options.scales.r.angleLines.color = grid;
            radar.update();
        }

        initRadar(true);

        // Anti-Spam Email Injector
        {{EMAIL_SCRIPT}}
    </script>
</body>

</html>
