<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Engineer | Personal Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --midnight: #0b0f19;
            --midnight-light: #161d2f;
            --lime: #b6f228;
            --lime-hover: #a5dc22;

            /* Platform Colors */
            --shopify: #95BF47;
            --webflow: #4353FF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #111827;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .dark {
            background-color: var(--midnight);
            color: #f9fafb;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 300px;
        }

        .bg-midnight-card {
            background-color: #f3f4f6;
        }

        .dark .bg-midnight-card {
            background-color: var(--midnight-light);
        }

        /* THE TWIST: Canvas Only (Scanlines removed) */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Removed .scanlines CSS */

        /* Typewriter Animation */
        .typewriter-text {
            border-right: 0.15em solid var(--lime);
            white-space: nowrap;
            overflow: hidden;
            font-family: 'Consolas', 'Courier New', monospace;
            animation: typing 2.5s steps(30, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes blink-caret {

            from,
            to {
                border-color: transparent
            }

            50% {
                border-color: var(--lime);
            }
        }

        /* Custom Scrollbar for horizontal strips */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Timeline Nodes */
        .timeline-node {
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border: 2px solid var(--lime);
            position: absolute;
            left: -7px;
            top: 6px;
        }

        .dark .timeline-node {
            background-color: var(--midnight);
        }

        .nav-blur {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.8);
        }

        .dark .nav-blur {
            background-color: rgba(11, 15, 25, 0.8);
        }

        /* Glitch Effect */
        @keyframes glitch-anim {
            0% {
                clip-path: inset(50% 0 50% 0);
                transform: skew(0.3deg);
            }

            20% {
                clip-path: inset(10% 0 90% 0);
                transform: skew(0.3deg);
            }

            40% {
                clip-path: inset(80% 0 10% 0);
                transform: skew(-0.3deg);
            }

            60% {
                clip-path: inset(30% 0 70% 0);
                transform: skew(0.3deg);
            }

            80% {
                clip-path: inset(60% 0 30% 0);
                transform: skew(-0.3deg);
            }

            100% {
                clip-path: inset(50% 0 50% 0);
                transform: skew(0.3deg);
            }
        }

        .glitch-on-hover:hover::before,
        .glitch-on-hover:hover::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            z-index: -1;
        }

        .glitch-on-hover:hover::before {
            text-shadow: -2px 0 #ff00c1;
            clip-path: inset(50% 0 50% 0);
            animation: glitch-anim 0.3s infinite linear alternate-reverse;
        }

        .glitch-on-hover:hover::after {
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            clip-path: inset(50% 0 50% 0);
            animation: glitch-anim 0.3s infinite linear alternate;
        }

        .glitch-on-hover {
            position: relative;
        }
    </style>
</head>

<body class="antialiased dark"> <!-- Standardmäßig auf Dark gesetzt, weil es cooler aussieht -->

    <canvas id="bg-canvas"></canvas>
    <!-- Removed .scanlines DIV -->

    <nav class="fixed top-0 w-full z-50 nav-blur border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="font-black text-xl tracking-widest italic">USER<span class="text-[var(--lime)]">_</span>PROFILE
            </div>
            <button id="themeToggle"
                class="px-4 py-2 rounded-none bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 font-mono text-xs hover:text-[var(--lime)] transition-colors">
                <span id="themeLabel">LIGHT MODE</span>
            </button>
        </div>
    </nav>

    <main class="pt-32 pb-10">

        <section class="px-6 max-w-6xl mx-auto mb-32 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            <div class="lg:col-span-7">
                <div id="stats-summary" class="inline-block px-3 py-1 bg-[var(--lime)] text-black text-xs font-bold mb-6 font-mono">> loading_stats...</div>
                <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter typewriter-text"><span id="profile-greeting">loading</span><span
                        class="text-[var(--lime)]">_</span></h1>
                <h2 id="profile-title" class="text-2xl font-bold mb-6 opacity-90">...</h2>
                <p id="profile-about" class="text-lg opacity-70 leading-relaxed mb-8 max-w-2xl">
                    ...
                </p>

                <div id="social-links" class="flex flex-wrap gap-4 font-mono text-sm">
                    <!-- Social Links dynamically injected here -->
                </div>
            </div>
            <div class="lg:col-span-5 flex justify-center lg:justify-end">
                <div class="relative group">
                    <div
                        class="absolute -inset-2 bg-[var(--lime)] opacity-20 group-hover:opacity-100 transition-opacity duration-500 blur-lg">
                    </div>
                    <img id="profile-avatar" src=""
                        alt="Profile Picture"
                        class="relative z-10 w-64 h-64 md:w-80 md:h-80 object-cover border-2 border-gray-200 dark:border-gray-800 group-hover:border-[var(--lime)] transition-colors duration-500 grayscale group-hover:grayscale-0">
                </div>
            </div>
        </section>

        <section class="px-6 max-w-6xl mx-auto mb-32 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <div class="bg-midnight-card p-8 border-t-2 border-[var(--lime)] relative">
                <div
                    class="absolute top-0 right-0 bg-[var(--lime)] text-black text-[10px] font-mono px-2 py-1 font-bold">
                    SYSTEM.STATS</div>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <div>
                <h2 class="text-3xl font-black mb-4 tracking-tighter">TECH_STACK</h2>
                <p id="tech-description" class="opacity-70 mb-6 leading-relaxed">
                    ...
                </p>
                <div id="tech-tools" class="grid grid-cols-2 gap-4 font-mono text-sm">
                    <!-- Tools injected here -->
                </div>
            </div>
        </section>

        <section class="px-6 max-w-6xl mx-auto mb-32">
            <h2 class="text-4xl font-black mb-12 tracking-tighter">EXECUTION_LOG <span
                    class="text-sm font-mono opacity-50 font-normal">/ CV</span></h2>

            <div id="cv-timeline" class="border-l-2 border-gray-300 dark:border-gray-700 ml-3 space-y-12 pb-4">
                <!-- Timeline Items injected here -->
            </div>
        </section>

        <div class="mb-12 px-6 max-w-6xl mx-auto">
            <h2 class="text-4xl font-black tracking-tighter">DEPLOYMENTS <span
                    class="text-sm font-mono opacity-50 font-normal">/ PROJECTS</span></h2>
        </div>

        <div id="projects-container">
            <!-- Project Sections injected here -->
        </div>

    </main>

    <footer class="bg-gray-100 dark:bg-gray-900 py-12 mt-20 border-t border-gray-200 dark:border-gray-800 text-center">
        <div class="flex justify-center gap-6 mb-6">
            <a href="#" class="font-mono text-sm hover:text-[var(--lime)] transition-colors glitch-on-hover"
                data-text="GITHUB">GITHUB</a>
            <a href="#" class="font-mono text-sm hover:text-[var(--lime)] transition-colors glitch-on-hover"
                data-text="LINKEDIN">LINKEDIN</a>
            <a href="#" class="font-mono text-sm hover:text-[var(--lime)] transition-colors glitch-on-hover"
                data-text="EMAIL">EMAIL</a>
        </div>
        <p class="text-sm opacity-40 font-mono tracking-tighter">
            // END OF LINE // SYSTEM ONLINE // © 2024
        </p>
    </footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeLabel = document.getElementById('themeLabel');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            themeLabel.innerText = isDark ? 'LIGHT MODE' : 'DARK MODE';
            updateRadar(isDark);
        });

        // --- Interactive Grid Canvas ---
        const canvas = document.getElementById('bg-canvas');
        const ctxCanvas = canvas.getContext('2d');
        let width, height;
        let mouseX = -1000;
        let mouseY = -1000;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function drawGrid() {
            ctxCanvas.clearRect(0, 0, width, height);
            const isDark = document.body.classList.contains('dark');

            const spacing = 35;
            const radius = 1.5;
            const dotColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';

            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    const dx = mouseX - x;
                    const dy = mouseY - y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = 250;

                    if (distance < maxDist) {
                        const intensity = 1 - (distance / maxDist);
                        ctxCanvas.fillStyle = `rgba(182, 242, 40, ${intensity * 0.9})`;
                        ctxCanvas.beginPath();
                        ctxCanvas.arc(x, y, radius + (intensity * 2), 0, Math.PI * 2);
                        ctxCanvas.fill();
                    } else {
                        ctxCanvas.fillStyle = dotColor;
                        ctxCanvas.fillRect(x, y, radius, radius);
                    }
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        // --- Radar Chart Logic ---
        let radar;
        let radarLabels = [];
        let radarData = [];

        function initRadar(isDark) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            const labelColor = isDark ? '#ffffff' : '#111827';

            radar = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: radarLabels,
                    datasets: [{
                        data: radarData,
                        backgroundColor: 'rgba(182, 242, 40, 0.2)',
                        borderColor: '#b6f228',
                        pointBackgroundColor: '#b6f228',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            grid: { color: gridColor },
                            angleLines: { color: gridColor },
                            pointLabels: { color: labelColor, font: { size: 10, family: 'monospace' } },
                            ticks: { display: false }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateRadar(isDark) {
            if (!radar) return;
            const color = isDark ? '#ffffff' : '#111827';
            const grid = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            radar.options.scales.r.pointLabels.color = color;
            radar.options.scales.r.grid.color = grid;
            radar.options.scales.r.angleLines.color = grid;
            radar.update();
        }

        // --- Dynamic Content Loading ---
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                // Profile
                document.getElementById('profile-greeting').textContent = data.profile.greeting;
                document.getElementById('profile-title').textContent = data.profile.title;
                document.getElementById('profile-about').textContent = data.profile.about;
                document.getElementById('profile-avatar').src = data.profile.avatar;

                const socialLinksContainer = document.getElementById('social-links');
                socialLinksContainer.innerHTML = '';
                
                if (data.profile.social.linkedin && data.profile.social.linkedin !== "#") {
                    socialLinksContainer.innerHTML += `
                    <a href="${data.profile.social.linkedin}" target="_blank"
                        class="px-4 py-2 border border-gray-300 dark:border-gray-700 hover:border-[var(--lime)] dark:hover:border-[var(--lime)] hover:text-[var(--lime)] transition-colors flex items-center gap-2 glitch-on-hover"
                        data-text="LinkedIn">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" /></svg>
                        LinkedIn
                    </a>`;
                }
                if (data.profile.social.github && data.profile.social.github !== "#") {
                    socialLinksContainer.innerHTML += `
                    <a href="${data.profile.social.github}" target="_blank"
                        class="px-4 py-2 border border-gray-300 dark:border-gray-700 hover:border-[var(--lime)] dark:hover:border-[var(--lime)] hover:text-[var(--lime)] transition-colors flex items-center gap-2 glitch-on-hover"
                        data-text="GitHub">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" /></svg>
                        GitHub
                    </a>`;
                }
                if (data.profile.social.email) {
                    socialLinksContainer.innerHTML += `
                    <a href="mailto:${data.profile.social.email}"
                        class="px-4 py-2 bg-[var(--lime)] text-black hover:bg-[var(--lime-hover)] transition-colors flex items-center gap-2 font-bold glitch-on-hover"
                        data-text="${data.profile.social.email}">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M0 3v18h24v-18h-24zm21.518 2l-9.518 7.713-9.518-7.713h19.036zm-19.518 14v-11.817l10 8.104 10-8.104v11.817h-20z" /></svg>
                        ${data.profile.social.email}
                    </a>`;
                }

                // Tech Stack
                document.getElementById('tech-description').textContent = data.techStack.description;
                const techToolsContainer = document.getElementById('tech-tools');
                techToolsContainer.innerHTML = '';
                data.techStack.tools.forEach(tool => {
                    techToolsContainer.innerHTML += `<div class="flex items-center gap-2"><span class="w-2 h-2" style="background-color: ${tool.color}"></span> ${tool.name}</div>`;
                });

                // Radar Chart Setup
                radarLabels = data.techStack.radarLabels;
                radarData = data.techStack.radarData;
                initRadar(document.body.classList.contains('dark'));

                // CV Timeline
                const cvContainer = document.getElementById('cv-timeline');
                cvContainer.innerHTML = '';
                data.cv.forEach((item, index) => {
                    const isFirst = index === 0;
                    cvContainer.innerHTML += `
                    <div class="relative pl-8">
                        <div class="timeline-node ${!isFirst ? 'border-gray-400 dark:border-gray-500' : ''}"></div>
                        <div class="flex flex-col md:flex-row md:items-baseline gap-2 mb-2">
                            <h3 class="text-xl font-bold">${item.role}</h3>
                            <span class="font-mono text-sm ${isFirst ? 'text-[var(--lime)] bg-[var(--lime)]/10 px-2 py-0.5' : 'opacity-60'}">${item.period}</span>
                        </div>
                        <p class="text-sm font-bold opacity-70 mb-3">${item.company}</p>
                        <p class="opacity-80 max-w-2xl text-sm leading-relaxed">${item.description}</p>
                    </div>`;
                });

                // Projects
                const projectsContainer = document.getElementById('projects-container');
                projectsContainer.innerHTML = '';
                let totalProjects = 0;
                let webflowCount = 0;
                let shopifyCount = 0;

                Object.keys(data.projects).forEach(categoryKey => {
                    const category = data.projects[categoryKey];
                    totalProjects += category.items.length;
                    if (categoryKey === 'webflow') webflowCount += category.items.length;
                    if (categoryKey === 'shopify') shopifyCount += category.items.length;

                    let itemsHtml = '';
                    category.items.forEach(item => {
                        let imageHtml = '';
                        if (item.image && item.image !== "[IMG_PLACEHOLDER]") {
                            imageHtml = `<div class="h-40 bg-gray-100 dark:bg-gray-900 mb-4 flex items-center justify-center font-mono text-[var(--lime)] text-xs border border-transparent group-hover:border-[${category.color}]/30">
                                <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentNode.innerHTML='[IMG_PLACEHOLDER]'"/>
                            </div>`;
                        } else {
                            imageHtml = `<div class="h-40 bg-gray-100 dark:bg-gray-900 mb-4 flex items-center justify-center font-mono text-[var(--lime)] text-xs border border-transparent group-hover:border-[${category.color}]/30">
                                [IMG_PLACEHOLDER]
                            </div>`;
                        }
                        
                        itemsHtml += `
                        <a href="${item.link}" target="_blank"
                            class="snap-start min-w-[300px] md:min-w-[400px] bg-white dark:bg-[var(--midnight-light)] border border-gray-200 dark:border-gray-800 p-6 hover:-translate-y-2 hover:border-[${category.color}] transition-all group block glitch-on-hover"
                            data-text="${item.title}">
                            ${imageHtml}
                            <h4 class="font-bold text-lg mb-2 group-hover:text-[${category.color}] transition-colors">${item.title}</h4>
                            <p class="text-sm opacity-70 mb-4">${item.description}</p>
                            <span class="text-xs font-mono border-b border-transparent group-hover:border-[${category.color}] text-[${category.color}]">${item.linkText} -></span>
                        </a>`;
                    });

                    projectsContainer.innerHTML += `
                    <section class="w-full border-y border-[${category.color}] bg-[${category.color}]/5 py-12 mb-8" style="border-color: ${category.color}">
                        <div class="max-w-6xl mx-auto px-6">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="w-3 h-3" style="background-color: ${category.color}"></span>
                                <h3 class="text-2xl font-bold tracking-tight">${category.title}</h3>
                            </div>
                            <div class="flex overflow-x-auto gap-6 pb-6 hide-scrollbar snap-x">
                                ${itemsHtml}
                            </div>
                        </div>
                    </section>`;
                });

                // Stats Summary
                document.getElementById('stats-summary').textContent = `> ${totalProjects} Projects | ${webflowCount} Webflow | ${shopifyCount} Shopify`;

            } catch (error) {
                console.error("Fehler beim Laden der data.json:", error);
            }
        }

        loadData();
    </script>
</body>

</html>
